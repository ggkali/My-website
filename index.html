<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
    <meta name="description" content="NICEESAKUN - Tempat terbaik untuk membeli akun Free Fire premium dengan harga terjangkau. Garansi 2 bulan, aman, dan terpercaya.">
    <meta name="keywords" content="akun free fire, jual akun ff, niceesakun, top up ff, akun murah">
    <meta name="author" content="NICEESAKUN">
    <title>NICEESAKUN</title>
    <!-- Font Awesome & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        /* =============================================
                   CSS - GAYA UTAMA
                   ============================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            overflow-x: hidden;
            width: 100%;
            max-width: 100%;
            background: #0c0717;
        }
        body {
            background: linear-gradient(135deg, #0c0717 0%, #1a0f2e 100%);
            font-family: 'Inter', sans-serif;
            color: #f0eaff;
            min-height: 100vh;
            -webkit-text-size-adjust: 100%;
        }
        #app {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 14px;
            width: 100%;
        }

        /* ===== HEADER ===== */
        .header-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0 8px 0;
            flex-wrap: wrap;
            gap: 8px;
        }
        .logo-text {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #f0e6ff 0%, #c49eff 40%, #9b5eff 80%, #e0b8ff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmer 3s linear infinite;
            display: inline-block;
        }
        .logo-text i {
            margin-right: 6px;
            font-size: 1.3rem;
        }
        @keyframes shimmer {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 200% 50%;
            }
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: #decbff;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 40px;
            background: rgba(155, 94, 255, 0.15);
            border: 1px solid rgba(155, 94, 255, 0.3);
            white-space: nowrap;
            transition: 0.2s;
        }
        .nav-links a:hover {
            background: rgba(155, 94, 255, 0.3);
            border-color: #b27aff;
            color: white;
        }
        .nav-links a.active {
            background: linear-gradient(135deg, #9b5eff, #7a3cff);
            color: white;
            border-color: #9b5eff;
            box-shadow: 0 4px 12px rgba(122, 60, 255, 0.3);
        }

        /* ===== BANNER ===== */
        .banner-container {
            position: relative;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 16px;
            box-shadow: 0 12px 25px -8px rgba(0, 0, 0, 0.5);
        }
        .banner-slider {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
        }
        .banner-slides {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .banner-slide {
            min-width: 100%;
            height: 100%;
            position: relative;
            flex-shrink: 0;
        }
        .banner-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .banner-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(10, 5, 25, 0.9), transparent);
            padding: 16px 14px 10px;
        }
        .banner-caption h4 {
            font-size: 0.85rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f0e6ff, #cb9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .banner-caption p {
            font-size: 0.6rem;
            opacity: 0.8;
        }
        .banner-dots {
            position: absolute;
            bottom: 8px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 6px;
            z-index: 10;
        }
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.2s;
        }
        .dot.active {
            width: 20px;
            border-radius: 10px;
            background: #b77cff;
            box-shadow: 0 0 8px #b77cff;
        }

        /* ===== SEARCH & FILTER ===== */
        .search-filter {
            margin-bottom: 14px;
        }
        .search-box {
            background: rgba(30, 20, 50, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            border: 1px solid rgba(155, 94, 255, 0.5);
            display: flex;
            align-items: center;
            padding: 3px 4px 3px 16px;
            margin-bottom: 10px;
        }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 8px;
            color: #f5eeff;
            font-size: 0.8rem;
            outline: none;
            min-width: 0;
        }
        .search-box button {
            background: linear-gradient(95deg, #9b5eff, #7a3cff);
            border: none;
            border-radius: 50px;
            padding: 7px 16px;
            color: white;
            font-weight: 600;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .search-box button:hover {
            transform: scale(0.95);
        }

        .price-filter-wrapper {
            background: rgba(30, 20, 50, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(155, 94, 255, 0.5);
            overflow: hidden;
        }
        .filter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            font-weight: 600;
            color: #decbff;
            font-size: 0.8rem;
        }
        .filter-header:hover {
            background: rgba(155, 94, 255, 0.08);
        }
        .filter-header span i {
            margin-right: 8px;
            color: #b77cff;
        }
        .toggle-icon {
            transition: transform 0.3s ease;
        }
        .toggle-icon.open {
            transform: rotate(180deg);
        }

        .filter-body {
            padding: 0 16px 16px 16px;
            display: none;
            border-top: 1px solid rgba(155, 94, 255, 0.2);
        }
        .filter-body.open {
            display: block;
        }
        .price-range {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .price-input {
            flex: 1;
            min-width: 90px;
            background: rgba(12, 5, 25, 0.7);
            border: 1px solid rgba(157, 102, 255, 0.5);
            border-radius: 40px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .price-input i {
            color: #b77cff;
            font-size: 0.7rem;
        }
        .price-input input {
            background: transparent;
            border: none;
            color: #f0eaff;
            width: 100%;
            outline: none;
            font-size: 0.75rem;
            min-width: 0;
        }
        .price-input input::placeholder {
            color: #7a68a8;
        }
        .apply-price-btn {
            background: linear-gradient(95deg, #9b5eff, #7a3cff);
            border: none;
            border-radius: 40px;
            padding: 9px 14px;
            color: white;
            font-weight: 600;
            font-size: 0.7rem;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .apply-price-btn:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }
        .reset-price-btn {
            background: rgba(155, 94, 255, 0.15);
            border: 1px solid rgba(155, 94, 255, 0.4);
            border-radius: 40px;
            padding: 6px 12px;
            color: #decbff;
            font-size: 0.65rem;
            cursor: pointer;
            text-align: center;
            margin-top: 6px;
            transition: 0.2s;
        }
        .reset-price-btn:hover {
            background: rgba(155, 94, 255, 0.3);
        }

        /* ===== PRODUCT GRID ===== */
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .product-card {
            background: rgba(26, 18, 45, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(155, 94, 255, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .product-card:hover {
            transform: translateY(-4px);
            border-color: #b27aff;
            box-shadow: 0 16px 30px -12px rgba(0, 0, 0, 0.6);
            background: rgba(34, 24, 58, 0.95);
        }

        .card-img-wrapper {
            position: relative;
            width: 100%;
            padding-top: 100%;
            overflow: hidden;
            background: #0f0822;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(157, 102, 255, 0.15);
        }
        .card-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 8px;
            background-color: #0f0822;
        }
        .card-body {
            padding: 10px 12px 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 80px;
        }
        .card-title {
            font-weight: 700;
            font-size: 0.75rem;
            line-height: 1.3;
            margin-bottom: 4px;
            color: #f3eaff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 32px;
        }
        .card-code {
            font-size: 0.5rem;
            font-family: monospace;
            color: #ad93e0;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .card-price-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            border-top: 1px dashed rgba(157, 102, 255, 0.3);
            padding-top: 6px;
            margin-top: auto;
        }
        .current-price {
            font-weight: 800;
            font-size: 0.85rem;
            color: #dcb5ff;
        }
        .old-price {
            font-size: 0.55rem;
            text-decoration: line-through;
            color: #9a7bc2;
        }

        .empty-state {
            grid-column: span 2;
            text-align: center;
            padding: 40px 20px;
            background: rgba(155, 94, 255, 0.08);
            border-radius: 28px;
            border: 1px dashed #b27aff;
        }
        .empty-state p {
            margin-top: 8px;
        }

        /* ===== PAGINATION ===== */
        .pagination-wrapper {
            background: rgba(26, 18, 45, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 6px 10px;
            margin: 12px 0 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3px;
            border: 1px solid rgba(155, 94, 255, 0.4);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .pagination-wrapper::-webkit-scrollbar {
            display: none;
        }
        .page-btn {
            background: rgba(20, 12, 38, 0.8);
            border: none;
            color: #decbff;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            min-width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .page-btn i {
            font-size: 0.6rem;
        }
        .page-btn:hover:not(.active):not(:disabled) {
            background: rgba(155, 94, 255, 0.3);
        }
        .page-btn.active {
            background: linear-gradient(135deg, #9b5eff, #7a3cff);
            color: white;
            box-shadow: 0 4px 12px rgba(122, 60, 255, 0.4);
            cursor: default;
        }
        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .page-ellipsis {
            color: #b593e6;
            padding: 0 2px;
            font-size: 0.7rem;
        }

        /* ===== DETAIL PAGE ===== */
        .detail-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 12px 14px 40px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(36, 24, 66, 0.9);
            backdrop-filter: blur(12px);
            padding: 8px 16px;
            border-radius: 40px;
            margin-bottom: 14px;
            border: 1px solid rgba(183, 124, 255, 0.5);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            color: #f0eaff;
            transition: 0.3s;
            text-decoration: none;
        }
        .back-btn:hover {
            background: #9b5eff;
            border-color: white;
        }
        .detail-card {
            background: rgba(26, 18, 48, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(157, 102, 255, 0.5);
        }

        .detail-gallery-wrapper {
            position: relative;
            width: 100%;
            background: #0f0822;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 320px;
            max-height: 460px;
            aspect-ratio: 1 / 1;
            cursor: pointer;
        }
        .detail-gallery-wrapper .zoom-hint {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.55rem;
            color: #decbff;
            border: 1px solid rgba(183, 124, 255, 0.3);
            z-index: 5;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .detail-gallery-wrapper .zoom-hint i {
            font-size: 0.5rem;
        }
        .detail-gallery {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            align-items: center;
        }
        .detail-gallery img {
            min-width: 100%;
            height: 100%;
            object-fit: contain;
            flex-shrink: 0;
            cursor: zoom-in;
            background: #0f0822;
            padding: 16px;
            transition: transform 0.3s ease;
        }
        .detail-gallery img:hover {
            transform: scale(1.02);
        }
        .gallery-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(183, 124, 255, 0.4);
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            z-index: 10;
        }
        .gallery-btn:hover {
            background: #9b5eff;
            border-color: #9b5eff;
            transform: translateY(-50%) scale(1.1);
        }
        .gallery-btn.prev {
            left: 10px;
        }
        .gallery-btn.next {
            right: 10px;
        }

        .gallery-dots {
            position: absolute;
            bottom: 12px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 8px;
            z-index: 10;
        }
        .gallery-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.2s;
        }
        .gallery-dot.active {
            width: 24px;
            border-radius: 10px;
            background: #b77cff;
            box-shadow: 0 0 12px rgba(183, 124, 255, 0.5);
        }
        .gallery-counter {
            position: absolute;
            top: 12px;
            right: 14px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            color: #decbff;
            font-size: 0.65rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            z-index: 10;
            border: 1px solid rgba(183, 124, 255, 0.3);
        }

        .detail-content {
            padding: 18px 18px 22px;
        }
        .detail-code {
            background: rgba(0, 0, 0, 0.4);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 0.6rem;
            margin-bottom: 8px;
            color: #ad93e0;
        }
        .detail-code i {
            margin-right: 4px;
            color: #b77cff;
        }
        .detail-title {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 6px;
            line-height: 1.3;
            color: #f3eaff;
        }
        .detail-price {
            font-size: 1.4rem;
            font-weight: 800;
            color: #e3bdff;
        }
        .detail-old {
            font-size: 0.8rem;
            text-decoration: line-through;
            color: #a384ce;
            margin-left: 8px;
        }
        .price-detail-row {
            margin: 10px 0;
        }
        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 10px 0 12px;
        }
        .tag-item {
            background: rgba(130, 70, 255, 0.2);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.6rem;
            font-weight: 600;
            border: 0.5px solid #a471ff;
            color: #dcb5ff;
        }
        .desc-box {
            background: rgba(12, 5, 30, 0.7);
            border-radius: 16px;
            padding: 14px;
            margin: 12px 0 16px;
            border-left: 3px solid #b77cff;
            font-size: 0.78rem;
            line-height: 1.5;
            white-space: pre-line;
            color: #decbff;
        }
        .wa-button {
            background: linear-gradient(95deg, #25D366, #128C7E);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 13px 0;
            border-radius: 60px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .wa-button:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }

        /* ===== ZOOM OVERLAY ===== */
        .zoom-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 3, 22, 0.97);
            backdrop-filter: blur(24px);
            z-index: 20000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: zoomFade 0.3s ease;
            touch-action: none;
        }
        .zoom-overlay.active {
            display: flex;
        }
        @keyframes zoomFade {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .zoom-overlay .zoom-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .zoom-overlay .zoom-container .zoom-img-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
            cursor: grab;
        }
        .zoom-overlay .zoom-container .zoom-img-wrapper:active {
            cursor: grabbing;
        }
        .zoom-overlay .zoom-container .zoom-img-wrapper img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 12px;
            border: 2px solid rgba(183, 124, 255, 0.3);
            object-fit: contain;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            user-select: none;
            -webkit-user-drag: none;
            transition: none;
            transform-origin: center center;
            will-change: transform;
        }
        .zoom-overlay .close-zoom {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(183, 124, 255, 0.2);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            cursor: pointer;
            color: white;
            border: 1px solid rgba(183, 124, 255, 0.4);
            transition: 0.2s;
            z-index: 10;
            backdrop-filter: blur(8px);
        }
        .zoom-overlay .close-zoom:hover {
            background: #b77cff;
            transform: rotate(90deg);
        }
        .zoom-overlay .zoom-counter {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            color: #decbff;
            font-size: 0.7rem;
            padding: 6px 18px;
            border-radius: 30px;
            border: 1px solid rgba(183, 124, 255, 0.3);
            z-index: 10;
        }
        .zoom-overlay .zoom-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(183, 124, 255, 0.3);
            color: white;
            width: 48px;

        // =============================================
        // ===== PAGINATION =====
        // =============================================
        function generatePaginationNumbers(currentPage, totalPages) {
            let start = Math.floor((currentPage - 1) / 4) * 4 + 1;
            let end = Math.min(start + 3, totalPages);
            let result = [];
            for (let i = start; i <= end; i++) result.push(i);
            if (end < totalPages) { result.push('...');
                result.push(totalPages); }
            return result;
        }

        function renderPagination(totalItems, currentPg) {
            const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);
            if (totalPages <= 1) return '';
            const paginationNumbers = generatePaginationNumbers(currentPg, totalPages);
            let html = '<div class="pagination-wrapper">';
            html +=
                `<button class="page-btn" id="prevPageBtn" ${currentPg===1?'disabled':''}><i class="fas fa-chevron-left"></i></button>`;
            for (let item of paginationNumbers) {
                if (item === '...') html += `<span class="page-ellipsis">…</span>`;
                else html += `<button class="page-btn ${item===currentPg?'active':''}" data-page="${item}">${item}</button>`;
            }
            html +=
                `<button class="page-btn" id="nextPageBtn" ${currentPg===totalPages?'disabled':''}><i class="fas fa-chevron-right"></i></button>`;
            html += `</div>`;
            return html;
        }

        function renderList() {
            let filtered = [...allProducts];
            if (searchQuery.trim()) {
                const q = searchQuery.trim().toLowerCase();
                filtered = filtered.filter(p => p.name.toLowerCase().includes(q) || p.code.toLowerCase().includes(q));
            }
            if (minPrice !== null) filtered = filtered.filter(p => p.price >= minPrice);
            if (maxPrice !== null) filtered = filtered.filter(p => p.price <= maxPrice);

            const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);
            if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const paginated = filtered.slice((currentPage - 1) * ITEMS_PER_PAGE, currentPage * ITEMS_PER_PAGE);

            const cardsHtml = paginated.map(p => `
                <div class="product-card" onclick="goToDetail(${p.id})">
                    <div class="card-img-wrapper">
                        <img class="card-img" src="${p.thumbnail}" alt="${escapeHtml(p.name)}" loading="lazy"
                            onerror="this.onerror=null;this.src='${makePlaceholderSVG(p.code)}'">
                    </div>
                    <div class="card-body">
                        <div class="card-title">${escapeHtml(p.name)}</div>
                        <div class="card-code"><i class="fas fa-key"></i> Kode: ${p.code}</div>
                        <div class="card-price-row">
                            <span class="current-price">${p.priceFormatted}</span>
                            <span class="old-price">${p.originalPrice}</span>
                        </div>
                    </div>
                </div>`).join('');

            const emptyHtml = filtered.length === 0 ?
                `<div class="empty-state"><i class="fas fa-store-slash fa-2x"></i><p>Produk tidak ditemukan</p><button onclick="resetAllFilters()" style="margin-top:10px;background:#9b5eff;border:none;padding:7px 18px;border-radius:30px;color:white;cursor:pointer;">Reset Filter</button></div>` :
                '';

            const paginationHtml = filtered.length > 0 ? renderPagination(filtered.length, currentPage) : '';

            const html = `
            <div class="container">
                ${renderLogoAndNav()}
                ${renderBanner()}
                <div class="search-filter">
                    <div class="search-box">
                        <i class="fas fa-search" style="color:#b27aff;"></i>
                        <input type="text" id="searchInput" placeholder="Cari nama akun / kode ..." value="${escapeHtml(searchQuery)}">
                        <button id="searchBtn">Cari</button>
                    </div>
                    <div class="price-filter-wrapper">
                        <div class="filter-header" id="filterHeader">
                            <span><i class="fas fa-filter"></i> Filter Harga</span>
                            <i class="fas fa-chevron-down toggle-icon ${isFilterOpen?'open':''}" id="toggleFilterIcon"></i>
                        </div>
                        <div class="filter-body ${isFilterOpen?'open':''}" id="filterBody">
                            <div class="price-range">
                                <div class="price-input"><i class="fas fa-dollar-sign"></i><input type="number" id="minPriceInput" placeholder="Harga Min" value="${minPrice!==null?minPrice:''}"></div>
                                <div class="price-input"><i class="fas fa-dollar-sign"></i><input type="number" id="maxPriceInput" placeholder="Harga Max" value="${maxPrice!==null?maxPrice:''}"></div>
                            </div>
                            <button class="apply-price-btn" id="applyPriceBtn"><i class="fas fa-check-circle"></i> Terapkan Filter</button>
                            <div class="reset-price-btn" id="resetPriceBtn"><i class="fas fa-undo-alt"></i> Reset Filter Harga</div>
                        </div>
                    </div>
                </div>
                <div class="product-grid">${cardsHtml}${emptyHtml}</div>
                ${paginationHtml}
            </div>
            ${renderFooter()}
            ${renderFloatingButtons()}
            ${renderAdModal()}
            `;

            document.getElementById('app').innerHTML = html;
            initListEvents(filtered);
            initBannerEvents();
            startBannerAutoSlide();
            initAdEvents();
        }

        function initAdEvents() {
            const closeXBtn = document.getElementById('closeAdXBtn');
            const modal = document.getElementById('adModal');
            const closeAd = () => {
                if (modal) { modal.style.display = 'none';
                    isAdClosed = true; }
            };
            closeXBtn?.addEventListener('click', closeAd);
            modal?.addEventListener('click', (e) => { if (e.target === modal) closeAd(); });
        }

        function initListEvents(filtered) {
            document.getElementById('filterHeader')?.addEventListener('click', () => {
                isFilterOpen = !isFilterOpen;
                document.getElementById('filterBody')?.classList.toggle('open', isFilterOpen);
                document.getElementById('toggleFilterIcon')?.classList.toggle('open', isFilterOpen);
            });

            document.getElementById('searchBtn')?.addEventListener('click', () => { searchQuery = document
                    .getElementById('searchInput')?.value || '';
                currentPage = 1;
                render(); });
            document.getElementById('searchInput')?.addEventListener('keypress', e => { if (e.key === 'Enter') { searchQuery =
                        e.target.value;
                    currentPage = 1;
                    render(); } });

            document.getElementById('applyPriceBtn')?.addEventListener('click', () => {
                const minVal = document.getElementById('minPriceInput')?.value;
                const maxVal = document.getElementById('maxPriceInput')?.value;
                minPrice = minVal && minVal !== '' ? parseInt(minVal) : null;
                maxPrice = maxVal && maxVal !== '' ? parseInt(maxVal) : null;
                currentPage = 1;
                render();
            });
            document.getElementById('resetPriceBtn')?.addEventListener('click', () => { minPrice = null;
                maxPrice = null;
                currentPage = 1;
                render(); });

            document.getElementById('prevPageBtn')?.addEventListener('click', () => { if (currentPage > 1) { currentPage--;
                    render(); } });
            document.getElementById('nextPageBtn')?.addEventListener('click', () => { const tp = Math.ceil(filtered
                    .length / ITEMS_PER_PAGE);
                if (currentPage < tp) { currentPage++;
                    render(); } });
            document.querySelectorAll('.page-btn[data-page]').forEach(btn => {
                btn.addEventListener('click', e => { const pg = parseInt(e.currentTarget.getAttribute(
                    'data-page'));
                    if (!isNaN(pg) && pg !== currentPage) { currentPage = pg;
                        render(); } });
            });
        }

        function initBannerEvents() {
            document.querySelectorAll('.dot').forEach(dot => {
                dot.addEventListener('click', e => {
                    const idx = parseInt(e.target.getAttribute('data-index'));
                    if (!isNaN(idx)) { bannerIndex = idx;
                        updateBanner();
                        resetAutoSlide(); }
                });
            });
        }

        function updateBanner() {
            const slidesDiv = document.getElementById('bannerSlides');
            if (slidesDiv) slidesDiv.style.transform = `translateX(-${bannerIndex*100}%)`;
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === bannerIndex));
        }

        function resetAutoSlide() {
            if (autoSlideInterval) clearInterval(autoSlideInterval);
            autoSlideInterval = setInterval(() => { bannerIndex = (bannerIndex + 1) % bannerSlides.length;
                updateBanner(); }, 4500);
        }

        function startBannerAutoSlide() {
            if (autoSlideInterval) clearInterval(autoSlideInterval);
            autoSlideInterval = setInterval(() => { bannerIndex = (bannerIndex + 1) % bannerSlides.length;
                updateBanner(); }, 4500);
        }

        // =============================================
        // ===== TESTIMONI PAGE =====
        // =============================================
        function renderTestimoniPage() {
            const galleryHtml = testimoniImages.map(img => `
                <div class="testimoni-gallery-item" onclick="openZoomGallery('${img}')">
                    <img src="${img}" alt="Testimoni" loading="lazy" onerror="this.parentElement.style.display='none'">
                </div>
            `).join('');

            const html = `
            <div class="container">
                ${renderLogoAndNav()}
                <div class="back-testimoni-btn" onclick="navigateTo('list')">
                    <i class="fas fa-arrow-left"></i> Kembali ke Beranda
                </div>
                <div class="page-title"><i class="fas fa-images" style="color:#b77cff;"></i> Testimoni</div>
                <div class="page-sub">Klik gambar untuk memperbesar</div>
                <div class="testimoni-gallery">${galleryHtml}</div>
            </div>
            ${renderFooter()}
            ${renderFloatingButtons()}
            <div class="zoom-modal-gallery" id="zoomGalleryModal" onclick="closeZoomGallery(event)">
                <div class="close-zoom-gallery" onclick="closeZoomGallery(event)">&times;</div>
                <img id="zoomGalleryImg" src="">
                <div class="caption-zoom">Klik di luar gambar atau tekan X untuk menutup</div>
            </div>`;

            document.getElementById('app').innerHTML = html;
            if (autoSlideInterval) clearInterval(autoSlideInterval);
        }

        window.openZoomGallery = function(src) {
            const modal = document.getElementById('zoomGalleryModal');
            const img = document.getElementById('zoomGalleryImg');
            if (modal && img) { img.src = src;
                modal.classList.add('active');
                document.body.style.overflow = 'hidden'; }
        };

        window.closeZoomGallery = function(e) {
            if (e && e.target && e.target.closest && e.target.closest('.zoom-modal-gallery') === null && e.target !==
                document.getElementById('zoomGalleryModal')) return;
            const modal = document.getElementById('zoomGalleryModal');
            if (modal) { modal.classList.remove('active');
                document.body.style.overflow = ''; }
        };

        // =============================================
        // ===== ZOOM FUNCTIONS =====
        // =============================================
        function openZoomModal(src) {
            const overlay = document.getElementById('zoomOverlay');
            const img = document.getElementById('zoomOverlayImg');
            if (!overlay || !img) return;

            zoomState.scale = 1;
            zoomState.translateX = 0;
            zoomState.translateY = 0;
            zoomState.minScale = 1;
            zoomState.maxScale = 5;

            const galleryImgs = document.querySelectorAll('#detailGallery img');
            zoomImages = [];
            galleryImgs.forEach(el => zoomImages.push(el.src));

            if (zoomImages.length === 0) {
                zoomImages = [src];
            }

            zoomCurrentIndex = zoomImages.indexOf(src);
            if (zoomCurrentIndex === -1) zoomCurrentIndex = 0;

            img.src = zoomImages[zoomCurrentIndex];
            img.style.transform = 'scale(1) translate(0px, 0px)';
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            updateZoomCounter();

            showZoomInfo('Gunakan scroll atau pinch untuk zoom');
            setupZoomControls();
        }

        function closeZoomModal(e) {
            if (e && e.target && e.target.closest && e.target.closest('.zoom-container') && e.target.id !== 'zoomCloseBtn') {
                if (e.target.closest('.zoom-container') && !e.target.closest('.close-zoom') && !e.target.closest(
                    '.zoom-nav')) {
                    return;
                }
            }
            const overlay = document.getElementById('zoomOverlay');
            if (overlay) {
                overlay.classList.remove('active');
                document.body.style.overflow = '';
                const img = document.getElementById('zoomOverlayImg');
                if (img) {
                    img.style.transform = 'scale(1) translate(0px, 0px)';
                }
                zoomState.scale = 1;
                zoomState.translateX = 0;
                zoomState.translateY = 0;
            }
        }

        function navigateZoom(direction) {
            if (zoomImages.length <= 1) return;
            zoomState.scale = 1;
            zoomState.translateX = 0;
            zoomState.translateY = 0;
            const img = document.getElementById('zoomOverlayImg');
            if (img) {
                img.style.transform = 'scale(1) translate(0px, 0px)';
            }
            zoomCurrentIndex = (zoomCurrentIndex + direction + zoomImages.length) % zoomImages.length;
            if (img) img.src = zoomImages[zoomCurrentIndex];
            updateZoomCounter();
            showZoomInfo('Gunakan scroll atau pinch untuk zoom');
        }

        function updateZoomCounter() {
            const counter = document.getElementById('zoomCounter');
            if (counter) {
                counter.textContent = `${zoomCurrentIndex + 1} / ${zoomImages.length}`;
            }
        }

        function showZoomInfo(text) {
            const info = document.getElementById('zoomInfo');
            if (info) {
                info.textContent = text;
                info.classList.add('show');
                clearTimeout(info._hideTimeout);
                info._hideTimeout = setTimeout(() => {
                    info.classList.remove('show');
                }, 2000);
            }
        }

        function setupZoomControls() {
            const img = document.getElementById('zoomOverlayImg');
            const wrapper = document.getElementById('zoomImgWrapper');
            if (!img || !wrapper) return;

            img.style.transform = 'scale(1) translate(0px, 0px)';

            // Mouse wheel zoom
            img.addEventListener('wheel', function(e) {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                let newScale = zoomState.scale + delta;
                newScale = Math.max(zoomState.minScale, Math.min(zoomState.maxScale, newScale));

                if (newScale !== zoomState.scale) {
                    zoomState.scale = newScale;
                    applyZoomTransform(img);
                    if (newScale > 1) {
                        showZoomInfo(`Zoom: ${Math.round(newScale * 100)}%`);
                    } else {
                        showZoomInfo('Zoom normal');
                    }
                }
            }, { passive: false });

            // Touch events
            let touchStartDistance = 0;
            let touchStartScale = 1;

            wrapper.addEventListener('touchstart', function(e) {
                if (e.touches.length === 2) {
                    const touch1 = e.touches[0];
                    const touch2 = e.touches[1];
                    touchStartDistance = getDistance(touch1, touch2);
                    touchStartScale = zoomState.scale;
                } else if (e.touches.length === 1) {
                    zoomState.isDragging = true;
                    zoomState.startX = e.touches[0].clientX;
                    zoomState.startY = e.touches[0].clientY;
                    zoomState.lastX = zoomState.translateX;
                    zoomState.lastY = zoomState.translateY;
                }
            }, { passive: true });

            wrapper.addEventListener('touchmove', function(e) {
                e.preventDefault();
                if (e.touches.length === 2 && touchStartDistance > 0) {
                    const touch1 = e.touches[0];
                    const touch2 = e.touches[1];
                    const currentDistance = getDistance(touch1, touch2);
                    const scaleFactor = currentDistance / touchStartDistance;
                    let newScale = touchStartScale * scaleFactor;
                    newScale = Math.max(zoomState.minScale, Math.min(zoomState.maxScale, newScale));
                    zoomState.scale = newScale;
                    applyZoomTransform(img);
                    if (newScale > 1) {
                        showZoomInfo(`Zoom: ${Math.round(newScale * 100)}%`);
                    } else {
                        showZoomInfo('Zoom normal');
                    }
                } else if (e.touches.length === 1 && zoomState.isDragging) {
                    const dx = e.touches[0].clientX - zoomState.startX;
                    const dy = e.touches[0].clientY - zoomState.startY;
                    zoomState.translateX = zoomState.lastX + dx;
                    zoomState.translateY = zoomState.lastY + dy;
                    applyZoomTransform(img);
                }
            }, { passive: false });

            wrapper.addEventListener('touchend', function(e) {
                zoomState.isDragging = false;
                touchStartDistance = 0;
            }, { passive: true });

            // Mouse drag
            let isDragging = false;
            let dragStartX = 0;
            let dragStartY = 0;
            let dragLastX = 0;
            let dragLastY = 0;

            wrapper.addEventListener('mousedown', function(e) {
                if (e.button === 0) {
                    isDragging = true;
                    zoomState.isDragging = true;
                    dragStartX = e.clientX;
                    dragStartY = e.clientY;
                    dragLastX = zoomState.translateX;
                    dragLastY = zoomState.translateY;
                    wrapper.style.cursor = 'grabbing';
                }
            });

            document.addEventListener('mousemove', function(e) {
                if (isDragging && zoomState.scale > 1) {
                    const dx = e.clientX - dragStartX;
                    const dy = e.clientY - dragStartY;
                    zoomState.translateX = dragLastX + dx;
                    zoomState.translateY = dragLastY + dy;
                    applyZoomTransform(img);
                }
            });

            document.addEventListener('mouseup', function() {
                isDragging = false;
                zoomState.isDragging = false;
                wrapper.style.cursor = 'grab';
            });
        }

        function getDistance(touch1, touch2) {
            const dx = touch1.clientX - touch2.clientX;
            const dy = touch1.clientY - touch2.clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function applyZoomTransform(img) {
            if (!img) return;
            const scale = zoomState.scale;
            const tx = zoomState.translateX;
            const ty = zoomState.translateY;
            img.style.transform = `scale(${scale}) translate(${tx / scale}px, ${ty / scale}px)`;
        }

        // =============================================
        // ===== DETAIL VIEW =====
        // =============================================
        function renderDetail() {
            if (autoSlideInterval) clearInterval(autoSlideInterval);
            const p = selectedProduct;
            detailGalleryIndex = 0;
            const totalImgs = p.imgs.length;

            const imagesHtml = p.imgs.map((img, i) =>
                `<img src="${img}" alt="preview ${i+1}" onclick="openZoomModal('${img}')"
                          onerror="this.onerror=null;this.src='${makePlaceholderSVG(p.code)}';">`
            ).join('');

            const dotsHtml = totalImgs > 1 ?
                `<div class="gallery-dots">${p.imgs.map((_,i)=>`<div class="gallery-dot ${i===0?'active':''}" data-gi="${i}"></div>`).join('')}</div>`
                : '';

            const arrowsHtml = totalImgs > 1 ?
                `<button class="gallery-btn prev" id="galleryPrev"><i class="fas fa-chevron-left"></i></button>
                               <button class="gallery-btn next" id="galleryNext"><i class="fas fa-chevron-right"></i></button>` :
                '';

            const counterHtml = totalImgs > 1 ?
                `<div class="gallery-counter" id="galleryCounter">1 / ${totalImgs}</div>` :
                '';

            const zoomHintHtml = totalImgs > 0 ?
                `<div class="zoom-hint"><i class="fas fa-search-plus"></i> Klik untuk zoom</div>` :
                '';

            const tagsHtml = p.tags.map(t => `<span class="tag-item">${escapeHtml(t)}</span>`).join('');

            const html = `
            <div class="detail-container">
                ${renderLogoAndNav()}
                <div class="back-btn" id="backToListBtn"><i class="fas fa-arrow-left"></i> Kembali</div>
                <div class="detail-card">
                    <div class="detail-gallery-wrapper" id="detailGalleryWrapper">
                        <div class="detail-gallery" id="detailGallery">${imagesHtml}</div>
                        ${arrowsHtml}
                        ${dotsHtml}
                        ${counterHtml}
                        ${zoomHintHtml}
                    </div>
                    <div class="detail-content">
                        <div class="detail-code"><i class="fas fa-tag"></i> FREE FIRE • Kode: ${p.code}</div>
                        <div class="detail-title">${escapeHtml(p.name)}</div>
                        <div class="price-detail-row">
                            <span class="detail-price">${p.priceFormatted}</span>
                            <span class="detail-old">${p.originalPrice}</span>
                        </div>
                        <div class="tag-container">${tagsHtml}</div>
                        <div class="desc-box">📋 Deskripsi Lengkap :<br><br>${escapeHtml(p.fullDescription).replace(/\n/g,'<br>')}</div>
                        <a href="https://wa.me/6285700259736?text=Halo%20NICEESAKUN%2C%20saya%20mau%20beli%20kode:%20${encodeURIComponent(p.code)}%20-%20${encodeURIComponent(p.name)}" class="wa-button" target="_blank">
                            <i class="fab fa-whatsapp fa-lg"></i> Beli Sekarang (WhatsApp)
                        </a>
                    </div>
                </div>
            </div>

            <!-- ZOOM OVERLAY -->
            <div class="zoom-overlay" id="zoomOverlay">
                <div class="zoom-container">
                    <div class="close-zoom" id="zoomCloseBtn" onclick="closeZoomModal()">&times;</div>
                    <div class="zoom-img-wrapper" id="zoomImgWrapper">
                        <img id="zoomOverlayImg" src="" alt="Zoom">
                    </div>
                    <div class="zoom-info" id="zoomInfo">Gunakan scroll atau pinch untuk zoom</div>
                    ${totalImgs > 1 ? `
                        <button class="zoom-nav prev" id="zoomPrev" onclick="event.stopPropagation(); navigateZoom(-1)"><i class="fas fa-chevron-left"></i></button>
                        <button class="zoom-nav next" id="zoomNext" onclick="event.stopPropagation(); navigateZoom(1)"><i class="fas fa-chevron-right"></i></button>
                        <div class="zoom-counter" id="zoomCounter">1 / ${totalImgs}</div>
                    ` : ''}
                </div>
            </div>`;

            document.getElementById('app').innerHTML = html;
            initDetailEvents(totalImgs);
        }

        function initDetailEvents(totalImgs) {
            document.getElementById('backToListBtn')?.addEventListener('click', () => { currentView = 'list';
                render(); });

            document.getElementById('detailGalleryWrapper')?.addEventListener('click', function(e) {
                if (e.target.closest('.gallery-btn')) return;
                if (e.target.closest('.gallery-dots')) return;
                if (e.target.closest('.gallery-dot')) return;
                const activeImg = document.querySelector('#detailGallery img');
                if (activeImg) {
                    openZoomModal(activeImg.src);
                }
            });

            function updateGallery() {
                const gallery = document.getElementById('detailGallery');
                if (gallery) gallery.style.transform = `translateX(-${detailGalleryIndex*100}%)`;
                document.querySelectorAll('.gallery-dot').forEach((d, i) => d.classList.toggle('active', i ===
                    detailGalleryIndex));
                const counter = document.getElementById('galleryCounter');
                if (counter) counter.textContent = `${detailGalleryIndex+1} / ${totalImgs}`;
            }

            document.getElementById('galleryPrev')?.addEventListener('click', (e) => {
                e.stopPropagation();
                detailGalleryIndex = (detailGalleryIndex - 1 + totalImgs) % totalImgs;
                updateGallery();
            });
            document.getElementById('galleryNext')?.addEventListener('click', (e) => {
                e.stopPropagation();
                detailGalleryIndex = (detailGalleryIndex + 1) % totalImgs;
                updateGallery();
            });
            document.querySelectorAll('.gallery-dot').forEach(dot => {
                dot.addEventListener('click', (e) => {
                    e.stopPropagation();
                    detailGalleryIndex = parseInt(e.target.getAttribute('data-gi'));
                    updateGallery();
                });
            });

            let touchStartX = 0;
            const galleryEl = document.getElementById('detailGallery');
            galleryEl?.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
            galleryEl?.addEventListener('touchend', e => {
                const diff = touchStartX - e.changedTouches[0].clientX;
                if (Math.abs(diff) > 40) {
                    if (diff > 0) detailGalleryIndex = (detailGalleryIndex + 1) % totalImgs;
                    else detailGalleryIndex = (detailGalleryIndex - 1 + totalImgs) % totalImgs;
                    updateGallery();
                }
            }, { passive: true });

            document.getElementById('zoomOverlay')?.addEventListener('click', function(e) {
                if (e.target === this) {
                    closeZoomModal();
                }
            });
        }

        // =============================================
        // ===== UTILITY =====
        // =============================================
        window.goToDetail = id => {
    const p = allProducts.find(x => x.id === id);
    
    if (p) {
        
        history.pushState(
            {
                page: 'detail',
                productId: id
            },
            '',
            '#produk-' + id
        );
        
        selectedProduct = p;
        currentView = 'detail';
        render();
    }
};
        window.resetAllFilters = function() {
            searchQuery = '';
            minPrice = null;
            maxPrice = null;
            currentPage = 1;
            if (currentView !== 'list') currentView = 'list';
            render();
        };

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;',
                '>': '&gt;', '"': '&quot;', "'": '&#39;' } [m])); }

        window.openZoomModal = openZoomModal;
        window.closeZoomModal = closeZoomModal;
        window.navigateZoom = navigateZoom;

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const modal = document.getElementById('zoomGalleryModal');
                if (modal && modal.classList.contains('active')) { modal.classList.remove('active');
                    document.body.style.overflow = ''; }
                const zoomModal = document.getElementById('zoomOverlay');
                if (zoomModal && zoomModal.classList.contains('active')) {
                    zoomModal.classList.remove('active');
                    document.body.style.overflow = '';
                }
                const adModal = document.getElementById('adModal');
                if (adModal && adModal.style.display !== 'none') { adModal.style.display = 'none';
                    isAdClosed = true; }
            }

            const zoomOverlay = document.getElementById('zoomOverlay');
            if (zoomOverlay && zoomOverlay.classList.contains('active')) {
                if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    navigateZoom(-1);
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    navigateZoom(1);
                }
            }
        });

        // =============================================
        // ===== MULAI RENDER =====
        // =============================================
        render();
    </script>
</body>
</html>
